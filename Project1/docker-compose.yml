version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: express-station-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: express_station
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: express-station-backend
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/express_station
      - PORT=3000
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongodb_data:
