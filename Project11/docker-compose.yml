version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: expense-tracker-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: expense_tracker
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
