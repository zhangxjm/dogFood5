version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tea-shop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: tea_shop
      MYSQL_USER: tea_shop
      MYSQL_PASSWORD: tea_shop123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - tea-shop-network

  redis:
    image: redis:7-alpine
    container_name: tea-shop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tea-shop-network

volumes:
  mysql-data:
  redis-data:

networks:
  tea-shop-network:
    driver: bridge