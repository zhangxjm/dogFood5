services:
  web:
    build: .
    container_name: club-activity-system
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-club-activity-system-2024
    restart: unless-stopped
