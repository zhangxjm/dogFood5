services:
  mysql:
    image: mysql:8.0
    container_name: driving_school_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: driving_school
      MYSQL_USER: driving
      MYSQL_PASSWORD: driving123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - driving-network

  redis:
    image: redis:7-alpine
    container_name: driving_school_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - driving-network

volumes:
  mysql_data:
  redis_data:

networks:
  driving-network:
    driver: bridge
