version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pet-store-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pet-store-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
