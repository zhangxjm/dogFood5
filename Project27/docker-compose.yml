version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gift-manager-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gift-manager

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gift-manager-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gift-manager

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gift-manager-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
