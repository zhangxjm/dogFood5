version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: homestay-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: homestay123
      MYSQL_DATABASE: homestay_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
