services:
  mysql:
    image: mysql:8.0
    container_name: stall-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: stall_db
      MYSQL_USER: stall_user
      MYSQL_PASSWORD: stall_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/01_data.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - stall-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stall-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
    depends_on:
      - mysql
    networks:
      - stall-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stall-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - stall-network

volumes:
  mysql_data:

networks:
  stall-network:
    driver: bridge
