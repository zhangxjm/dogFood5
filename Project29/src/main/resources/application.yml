spring:
  application:
    name: snack-stand-api

  datasource:
    url: jdbc:mysql://localhost:3306/snack_stand?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: snack
    password: snack123456
