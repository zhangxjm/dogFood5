version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-book-postgres
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus123
      POSTGRES_DB: campus_book_exchange
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: campus-book-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
