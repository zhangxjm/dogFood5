<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厂区员工出入登记系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab.active {
            background: white;
            color: #667eea;
        }
        .tab:hover {
            background: rgba(255,255,255,0.3);
        }
        .tab.active:hover {
            background: white;
        }
        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        .panel.active {
            display: block;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            color: white;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }
        .stat-card p {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 厂区员工出入登记系统</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showPanel('dashboard')">仪表盘</button>
            <button class="tab" onclick="showPanel('employee')">员工管理</button>
            <button class="tab" onclick="showPanel('visitor')">访客管理</button>
            <button class="tab" onclick="showPanel('access')">出入登记</button>
            <button class="tab" onclick="showPanel('records')">记录查询</button>
        </div>

        <div id="message" class="message"></div>

        <div id="dashboard" class="panel active">
            <h2>📊 系统概览</h2>
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalEmployees">0</h3>
                    <p>员工总数</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalVisitors">0</h3>
                    <p>访客总数</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayIn">0</h3>
                    <p>今日进入</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayOut">0</h3>
                    <p>今日离开</p>
                </div>
            </div>
            <button class="btn" onclick="loadStats()">刷新数据</button>
        </div>

        <div id="employee" class="panel">
            <h2>👥 员工管理</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>员工编号</label>
                    <input type="text" id="empNo" placeholder="请输入员工编号">
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="empName" placeholder="请输入姓名">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>部门</label>
                    <input type="text" id="empDept" placeholder="请输入部门">
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" id="empPhone" placeholder="请输入电话">
                </div>
            </div>
            <button class="btn" onclick="addEmployee()">添加员工</button>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>员工编号</th>
                        <th>姓名</th>
                        <th>部门</th>
                        <th>电话</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="employeeList"></tbody>
            </table>
        </div>

        <div id="visitor" class="panel">
            <h2>🚪 访客管理</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="visitorName" placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" id="visitorPhone" placeholder="请输入电话">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" id="visitorIdCard" placeholder="请输入身份证号">
                </div>
                <div class="form-group">
                    <label>公司</label>
                    <input type="text" id="visitorCompany" placeholder="请输入公司">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>来访事由</label>
                    <input type="text" id="visitorPurpose" placeholder="请输入来访事由">
                </div>
                <div class="form-group">
                    <label>对接人</label>
                    <input type="text" id="visitorContact" placeholder="请输入对接人">
                </div>
            </div>
            <button class="btn" onclick="addVisitor()">添加访客</button>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>电话</th>
                        <th>公司</th>
                        <th>来访事由</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="visitorList"></tbody>
            </table>
        </div>

        <div id="access" class="panel">
            <h2>📝 出入登记</h2>
            <h3 style="margin-top: 20px;">员工出入</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>员工编号</label>
                    <input type="text" id="accessEmpNo" placeholder="请输入员工编号">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="accessEmpType">
                        <option value="in">进入</option>
                        <option value="out">离开</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="accessEmpRemark" placeholder="请输入备注（可选）">
            </div>
            <button class="btn btn-success" onclick="employeeAccess()">登记员工出入</button>

            <h3 style="margin-top: 30px;">访客出入</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>访客ID</label>
                    <input type="number" id="accessVisitorId" placeholder="请输入访客ID">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="accessVisitorType">
                        <option value="in">进入</option>
                        <option value="out">离开</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="accessVisitorRemark" placeholder="请输入备注（可选）">
            </div>
            <button class="btn btn-success" onclick="visitorAccess()">登记访客出入</button>
        </div>

        <div id="records" class="panel">
            <h2>📋 出入记录</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>类型筛选</label>
                    <select id="recordType" onchange="loadRecords(1)">
                        <option value="">全部</option>
                        <option value="employee">员工</option>
                        <option value="visitor">访客</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>每页条数</label>
                    <select id="pageSize" onchange="loadRecords(1)">
                        <option value="10">10条</option>
                        <option value="20" selected>20条</option>
                        <option value="50">50条</option>
                    </select>
                </div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>类型</th>
                        <th>姓名</th>
                        <th>进入时间</th>
                        <th>离开时间</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="recordList"></tbody>
            </table>
            
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;

        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            event.target.classList.add('active');
            
            if (panelId === 'dashboard') loadStats();
            if (panelId === 'employee') loadEmployees();
            if (panelId === 'visitor') loadVisitors();
            if (panelId === 'records') loadRecords(1);
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        async function loadStats() {
            try {
                const [empRes, visitorRes, recordsRes] = await Promise.all([
                    fetch('/api/employees'),
                    fetch('/api/visitors'),
                    fetch('/api/access/records?page_size=1000')
                ]);
                
                const employees = await empRes.json();
                const visitors = await visitorRes.json();
                const records = await recordsRes.json();
                
                document.getElementById('totalEmployees').textContent = employees.length || 0;
                document.getElementById('totalVisitors').textContent = visitors.length || 0;
                
                const today = new Date().toDateString();
                let todayIn = 0;
                let todayOut = 0;
                
                (records.data || []).forEach(r => {
                    if (r.in_time && new Date(r.in_time).toDateString() === today) {
                        todayIn++;
                    }
                    if (r.out_time && new Date(r.out_time).toDateString() === today) {
                        todayOut++;
                    }
                });
                
                document.getElementById('todayIn').textContent = todayIn;
                document.getElementById('todayOut').textContent = todayOut;
            } catch (e) {
                console.error(e);
            }
        }

        async function loadEmployees() {
            try {
                const res = await fetch('/api/employees');
                const employees = await res.json();
                const tbody = document.getElementById('employeeList');
                tbody.innerHTML = employees.map(emp => `
                    <tr>
                        <td>${emp.id}</td>
                        <td>${emp.employee_no}</td>
                        <td>${emp.name}</td>
                        <td>${emp.department || '-'}</td>
                        <td>${emp.phone || '-'}</td>
                        <td><button class="btn btn-small btn-danger" onclick="deleteEmployee(${emp.id})">删除</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                showMessage('加载员工列表失败', 'error');
            }
        }

        async function addEmployee() {
            const data = {
                employee_no: document.getElementById('empNo').value,
                name: document.getElementById('empName').value,
                department: document.getElementById('empDept').value,
                phone: document.getElementById('empPhone').value
            };

            try {
                const res = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showMessage('员工添加成功', 'success');
                    ['empNo', 'empName', 'empDept', 'empPhone'].forEach(id => document.getElementById(id).value = '');
                    loadEmployees();
                    loadStats();
                } else {
                    showMessage('员工添加失败', 'error');
                }
            } catch (e) {
                showMessage('员工添加失败', 'error');
            }
        }

        async function deleteEmployee(id) {
            if (!confirm('确定要删除该员工吗？')) return;
            try {
                const res = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showMessage('员工删除成功', 'success');
                    loadEmployees();
                    loadStats();
                }
            } catch (e) {
                showMessage('删除失败', 'error');
            }
        }

        async function loadVisitors() {
            try {
                const res = await fetch('/api/visitors');
                const visitors = await res.json();
                const tbody = document.getElementById('visitorList');
                tbody.innerHTML = visitors.map(v => `
                    <tr>
                        <td>${v.id}</td>
                        <td>${v.name}</td>
                        <td>${v.phone || '-'}</td>
                        <td>${v.company || '-'}</td>
                        <td>${v.purpose || '-'}</td>
                        <td><button class="btn btn-small btn-danger" onclick="deleteVisitor(${v.id})">删除</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                showMessage('加载访客列表失败', 'error');
            }
        }

        async function addVisitor() {
            const data = {
                name: document.getElementById('visitorName').value,
                phone: document.getElementById('visitorPhone').value,
                id_card: document.getElementById('visitorIdCard').value,
                company: document.getElementById('visitorCompany').value,
                purpose: document.getElementById('visitorPurpose').value,
                contact_person: document.getElementById('visitorContact').value
            };

            try {
                const res = await fetch('/api/visitors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showMessage('访客添加成功', 'success');
                    ['visitorName', 'visitorPhone', 'visitorIdCard', 'visitorCompany', 'visitorPurpose', 'visitorContact'].forEach(id => document.getElementById(id).value = '');
                    loadVisitors();
                    loadStats();
                } else {
                    showMessage('访客添加失败', 'error');
                }
            } catch (e) {
                showMessage('访客添加失败', 'error');
            }
        }

        async function deleteVisitor(id) {
            if (!confirm('确定要删除该访客吗？')) return;
            try {
                const res = await fetch(`/api/visitors/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showMessage('访客删除成功', 'success');
                    loadVisitors();
                    loadStats();
                }
            } catch (e) {
                showMessage('删除失败', 'error');
            }
        }

        async function employeeAccess() {
            const data = {
                employee_no: document.getElementById('accessEmpNo').value,
                type: document.getElementById('accessEmpType').value,
                remark: document.getElementById('accessEmpRemark').value
            };

            try {
                const res = await fetch('/api/access/employee', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showMessage('登记成功', 'success');
                    document.getElementById('accessEmpNo').value = '';
                    document.getElementById('accessEmpRemark').value = '';
                    loadStats();
                } else {
                    const err = await res.json();
                    showMessage(err.error || '登记失败', 'error');
                }
            } catch (e) {
                showMessage('登记失败', 'error');
            }
        }

        async function visitorAccess() {
            const data = {
                visitor_id: parseInt(document.getElementById('accessVisitorId').value),
                type: document.getElementById('accessVisitorType').value,
                remark: document.getElementById('accessVisitorRemark').value
            };

            try {
                const res = await fetch('/api/access/visitor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showMessage('登记成功', 'success');
                    document.getElementById('accessVisitorId').value = '';
                    document.getElementById('accessVisitorRemark').value = '';
                    loadStats();
                } else {
                    const err = await res.json();
                    showMessage(err.error || '登记失败', 'error');
                }
            } catch (e) {
                showMessage('登记失败', 'error');
            }
        }

        async function loadRecords(page) {
            const type = document.getElementById('recordType').value;
            const pageSize = document.getElementById('pageSize').value;
            
            let url = `/api/access/records?page=${page}&page_size=${pageSize}`;
            if (type) url += `&type=${type}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                
                const tbody = document.getElementById('recordList');
                tbody.innerHTML = (data.data || []).map(r => {
                    const name = r.employee ? r.employee.name : (r.visitor ? r.visitor.name : '-');
                    const typeLabel = r.type === 'employee' ? '员工' : '访客';
                    return `
                        <tr>
                            <td>${r.id}</td>
                            <td>${typeLabel}</td>
                            <td>${name}</td>
                            <td>${r.in_time ? new Date(r.in_time).toLocaleString() : '-'}</td>
                            <td>${r.out_time ? new Date(r.out_time).toLocaleString() : '-'}</td>
                            <td>${r.remark || '-'}</td>
                        </tr>
                    `;
                }).join('');

                totalPages = data.total_page || 1;
                currentPage = page;
                renderPagination();
            } catch (e) {
                showMessage('加载记录失败', 'error');
            }
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button onclick="loadRecords(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            html += `<span style="padding: 8px 16px;">第 ${currentPage} / ${totalPages} 页</span>`;
            html += `<button onclick="loadRecords(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        loadStats();
    </script>
</body>
</html>
