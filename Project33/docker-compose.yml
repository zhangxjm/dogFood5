version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: babycare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: babycare_member
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - babycare-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: babycare-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/babycare_member?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      TZ: Asia/Shanghai
    depends_on:
      - mysql
    networks:
      - babycare-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: babycare-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - babycare-network

volumes:
  mysql-data:

networks:
  babycare-network:
    driver: bridge