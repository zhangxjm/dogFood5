version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://sheetmusic:sheetmusic@db:5432/sheetmusic
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=sheetmusic
      - POSTGRES_PASSWORD=sheetmusic
      - POSTGRES_DB=sheetmusic
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
