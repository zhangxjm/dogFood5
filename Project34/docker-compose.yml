services:
  mysql:
    image: mysql:8.0
    container_name: warehouse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: warehouse123
      MYSQL_DATABASE: warehouse_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - warehouse-network

  app:
    build: .
    container_name: warehouse-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: warehouse123
      DB_NAME: warehouse_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - warehouse-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  warehouse-network:
    driver: bridge
