{% extends "base.html" %}

{% block title %}上传乐谱 - 乐谱共享平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="card-title mb-0"><i class="bi bi-cloud-upload"></i> 上传乐谱</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">乐谱标题</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-music-note"></i></span>
                            <input type="text" class="form-control" id="title" name="title" required placeholder="请输入乐谱标题">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="请输入乐谱描述（可选）"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="category_id" class="form-label">分类</label>
                        <select class="form-select" id="category_id" name="category_id">
                            <option value="">-- 请选择分类 --</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">选择文件</label>
                        <input type="file" class="form-control" id="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.gif" required>
                        <div class="form-text">支持 PDF、PNG、JPG、GIF 格式，最大 16MB</div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> 取消
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-cloud-upload"></i> 上传
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
