server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/document_circulation?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: dc_user
    password: dc_pass123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  upload:
    path: ./uploads
