version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: plant-care-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: plant_care
      MYSQL_USER: plantuser
      MYSQL_PASSWORD: plantpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - plant-care-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: plant-care-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=plantuser
      - DB_PASSWORD=plantpass123
      - DB_NAME=plant_care
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - plant-care-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: plant-care-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - plant-care-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql-data:

networks:
  plant-care-network:
    driver: bridge
