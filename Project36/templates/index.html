<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>露天停车场车位管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 42px;
            font-weight: bold;
        }
        .stat-card.total .value { color: #667eea; }
        .stat-card.available .value { color: #10b981; }
        .stat-card.occupied .value { color: #ef4444; }
        .stat-card.fee .value { color: #f59e0b; }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .parking-lot {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
        }
        .slot {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: default;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .slot.available {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .slot.occupied {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .slot .slot-num {
            font-weight: bold;
            font-size: 12px;
        }
        .slot .plate {
            font-size: 9px;
            margin-top: 2px;
            opacity: 0.9;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-entry {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            margin-bottom: 10px;
        }
        .btn-entry:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16,185,129,0.4);
        }
        .btn-exit {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-exit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(239,68,68,0.4);
        }
        .records-section {
            margin-top: 30px;
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .records-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 500;
        }
        .records-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e5e7eb;
            color: #333;
        }
        .records-table tr:last-child td {
            border-bottom: none;
        }
        .records-table tr:hover {
            background: #f9fafb;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-parked {
            background: #fef3c7;
            color: #d97706;
        }
        .status-exited {
            background: #d1fae5;
            color: #059669;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .chart-container {
            position: relative;
            height: 200px;
            margin-top: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>露天停车场车位管理系统</h1>
            <p>Open-air Parking Lot Management System</p>
        </div>

        <div class="stats-cards">
            <div class="stat-card total">
                <h3>总车位数</h3>
                <div class="value" id="totalSlots">0</div>
            </div>
            <div class="stat-card available">
                <h3>空余车位</h3>
                <div class="value" id="availableSlots">0</div>
            </div>
            <div class="stat-card occupied">
                <h3>已占用</h3>
                <div class="value" id="occupiedSlots">0</div>
            </div>
            <div class="stat-card fee">
                <h3>累计收费</h3>
                <div class="value" id="totalFee">0</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h2>车位分布图</h2>
                <div class="parking-lot" id="parkingLot"></div>
                <div style="margin-top: 20px; display: flex; gap: 20px; justify-content: center;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 20px; height: 20px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 4px;"></div>
                        <span style="color: #666;">空余</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 20px; height: 20px; background: linear-gradient(135deg, #ef4444, #dc2626); border-radius: 4px;"></div>
                        <span style="color: #666;">占用</span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>车辆管理</h2>
                <div class="form-group">
                    <label>车牌号</label>
                    <input type="text" id="plateNumber" placeholder="请输入车牌号，如：京A12345" style="text-transform: uppercase;">
                </div>
                <button class="btn btn-entry" onclick="vehicleEntry()">车辆入场</button>
                <button class="btn btn-exit" onclick="vehicleExit()">车辆离场</button>
            </div>
        </div>

        <div class="panel">
            <h2>停车时长统计</h2>
            <div class="chart-container">
                <canvas id="durationChart"></canvas>
            </div>
            <div id="durationStats" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px;"></div>
        </div>

        <div class="records-section">
            <div class="panel">
                <h2>停车记录</h2>
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('all')">全部记录</div>
                    <div class="tab" onclick="switchTab('active')">在场车辆</div>
                </div>
                <div class="tab-content active" id="tab-all">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>车牌号</th>
                                <th>车位</th>
                                <th>入场时间</th>
                                <th>离场时间</th>
                                <th>停车时长(小时)</th>
                                <th>费用(元)</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTable"></tbody>
                    </table>
                </div>
                <div class="tab-content" id="tab-active">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>车牌号</th>
                                <th>车位</th>
                                <th>入场时间</th>
                                <th>当前时长(小时)</th>
                            </tr>
                        </thead>
                        <tbody id="activeTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let durationChart = null;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalSlots').textContent = data.total;
                document.getElementById('availableSlots').textContent = data.available;
                document.getElementById('occupiedSlots').textContent = data.occupied;
            } catch (e) {
                console.error(e);
            }
        }

        async function loadSlots() {
            try {
                const res = await fetch('/api/slots');
                const slots = await res.json();
                const container = document.getElementById('parkingLot');
                container.innerHTML = slots.map(slot => `
                    <div class="slot ${slot.status}" title="${slot.slot_number}">
                        <span class="slot-num">${slot.slot_number}</span>
                        ${slot.plate_number ? `<span class="plate">${slot.plate_number}</span>` : ''}
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function vehicleEntry() {
            const plate = document.getElementById('plateNumber').value.trim();
            if (!plate) {
                showToast('请输入车牌号', 'error');
                return;
            }
            try {
                const res = await fetch('/api/entry', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plate_number: plate })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    document.getElementById('plateNumber').value = '';
                    refreshAll();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        async function vehicleExit() {
            const plate = document.getElementById('plateNumber').value.trim();
            if (!plate) {
                showToast('请输入车牌号', 'error');
                return;
            }
            try {
                const res = await fetch('/api/exit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plate_number: plate })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`${data.message} | 时长: ${data.duration_hours}小时 | 费用: ${data.fee}元`);
                    document.getElementById('plateNumber').value = '';
                    refreshAll();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        async function loadRecords() {
            try {
                const res = await fetch('/api/records?per_page=50');
                const data = await res.json();
                const tbody = document.getElementById('recordsTable');
                tbody.innerHTML = data.records.map(r => `
                    <tr>
                        <td><strong>${r.plate_number}</strong></td>
                        <td>${r.slot_number}</td>
                        <td>${r.entry_time}</td>
                        <td>${r.exit_time || '-'}</td>
                        <td>${r.duration ? r.duration.toFixed(2) : '-'}</td>
                        <td>${r.fee ? r.fee.toFixed(2) : '-'}</td>
                        <td>
                            <span class="status-badge ${r.exit_time ? 'status-exited' : 'status-parked'}">
                                ${r.exit_time ? '已离场' : '停放中'}
                            </span>
                        </td>
                    </tr>
                `).join('');

                const activeRecords = data.records.filter(r => !r.exit_time);
                const activeTbody = document.getElementById('activeTable');
                activeTbody.innerHTML = activeRecords.map(r => {
                    const hours = ((new Date() - new Date(r.entry_time)) / 3600000).toFixed(2);
                    return `
                        <tr>
                            <td><strong>${r.plate_number}</strong></td>
                            <td>${r.slot_number}</td>
                            <td>${r.entry_time}</td>
                            <td>${hours}</td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function loadDurationStats() {
            try {
                const res = await fetch('/api/duration-stats');
                const data = await res.json();
                document.getElementById('totalFee').textContent = data.total_fee.toFixed(2);

                const statsHtml = `
                    <div class="stat-card" style="padding: 15px;">
                        <h3>总车辆数</h3>
                        <div class="value" style="font-size: 28px; color: #667eea;">${data.total_vehicles}</div>
                    </div>
                    <div class="stat-card" style="padding: 15px;">
                        <h3>平均时长(小时)</h3>
                        <div class="value" style="font-size: 28px; color: #10b981;">${data.avg_duration}</div>
                    </div>
                    <div class="stat-card" style="padding: 15px;">
                        <h3>最长时长(小时)</h3>
                        <div class="value" style="font-size: 28px; color: #ef4444;">${data.max_duration}</div>
                    </div>
                    <div class="stat-card" style="padding: 15px;">
                        <h3>最短时长(小时)</h3>
                        <div class="value" style="font-size: 28px; color: #f59e0b;">${data.min_duration}</div>
                    </div>
                `;
                document.getElementById('durationStats').innerHTML = statsHtml;

                if (durationChart) {
                    durationChart.destroy();
                }
                const ctx = document.getElementById('durationChart').getContext('2d');
                durationChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['已离场车辆', '在场车辆'],
                        datasets: [{
                            data: [data.total_vehicles, parseInt(document.getElementById('occupiedSlots').textContent) || 0],
                            backgroundColor: ['#10b981', '#ef4444']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            } catch (e) {
                console.error(e);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function refreshAll() {
            loadStats();
            loadSlots();
            loadRecords();
            loadDurationStats();
        }

        refreshAll();
        setInterval(refreshAll, 10000);

        document.getElementById('plateNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                vehicleEntry();
            }
        });
    </script>
</body>
</html>
