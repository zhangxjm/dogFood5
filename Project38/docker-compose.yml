version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: parking_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: parking_db
      MYSQL_USER: parking
      MYSQL_PASSWORD: parking123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
