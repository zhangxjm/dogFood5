version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hardware-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hardware_shop
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app:
    build: .
    container_name: hardware-shop
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=hardware_shop
      - PORT=8080
    depends_on:
      - mysql
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static

volumes:
  mysql-data:
