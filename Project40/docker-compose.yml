version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./calligraphy.db
      - UPLOAD_DIR=/app/uploads
    restart: unless-stopped
