<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Court Reservation System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Campus Court Reservation System</h1>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="reserve">Reserve Court</button>
            <button class="tab-btn" data-tab="query">Query Records</button>
            <button class="tab-btn" data-tab="history">History</button>
        </nav>

        <section id="reserve" class="tab-content active">
            <div class="reserve-form">
                <h2>Reserve Court</h2>
                <div class="form-group">
                    <label>Select Date:</label>
                    <input type="date" id="reserveDate">
                </div>
                <div class="form-group">
                    <label>Select Court:</label>
                    <select id="courtSelect">
                        <option value="">--Please select--</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Time Slot:</label>
                    <div id="timeSlotContainer" class="time-slots">
                        <p class="hint">Please select date and court first</p>
                    </div>
                </div>
                <div class="form-group">
                    <label>Your Name:</label>
                    <input type="text" id="userName" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Phone Number:</label>
                    <input type="tel" id="userPhone" placeholder="Enter phone number">
                </div>
                <button class="btn-primary" id="reserveBtn">Confirm Reservation</button>
            </div>
        </section>

        <section id="query" class="tab-content">
            <div class="query-form">
                <h2>Query Reservations</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date:</label>
                        <input type="date" id="queryDate">
                    </div>
                    <div class="form-group">
                        <label>Court:</label>
                        <select id="queryCourt">
                            <option value="">All Courts</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="queryBtn">Query</button>
                </div>
            </div>
            <div id="queryResults" class="results-container">
                <p class="hint">Select conditions and click query</p>
            </div>
        </section>

        <section id="history" class="tab-content">
            <div class="history-form">
                <h2>Reservation History</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Keyword:</label>
                        <input type="text" id="historyKeyword" placeholder="Search by name or phone">
                    </div>
                    <button class="btn-primary" id="historyBtn">Search</button>
                </div>
            </div>
            <div id="historyResults" class="results-container">
                <p class="hint">Click search to view history</p>
            </div>
            <div id="pagination" class="pagination">
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
