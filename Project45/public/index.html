<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行出行清单规划系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>✈️ 旅行出行清单规划系统</h1>
      <div class="trip-selector">
        <select id="tripSelect" onchange="loadTripData()">
          <option value="">请选择旅行...</option>
        </select>
        <button class="btn btn-primary" onclick="showTripModal()">+ 新建旅行</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" onclick="switchTab('items')">🎒 物品清单</button>
      <button class="tab-btn" onclick="switchTab('routes')">🗺️ 路线备注</button>
      <button class="tab-btn" onclick="switchTab('budget')">💰 预算估算</button>
    </nav>

    <main>
      <section id="tab-items" class="tab-content active">
        <div class="section-header">
          <h2>物品清单</h2>
          <button class="btn btn-primary" onclick="showItemModal()">+ 添加物品</button>
        </div>
        <div id="itemsContainer" class="items-container"></div>
      </section>

      <section id="tab-routes" class="tab-content">
        <div class="section-header">
          <h2>路线备注</h2>
          <button class="btn btn-primary" onclick="showRouteModal()">+ 添加路线</button>
        </div>
        <div id="routesContainer" class="routes-container"></div>
      </section>

      <section id="tab-budget" class="tab-content">
        <div class="section-header">
          <h2>预算估算</h2>
          <button class="btn btn-primary" onclick="showBudgetModal()">+ 添加预算</button>
        </div>
        <div id="budgetSummary" class="budget-summary"></div>
        <div id="budgetContainer" class="budget-container"></div>
      </section>
    </main>
  </div>

  <div id="tripModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="tripModalTitle">新建旅行</h3>
        <span class="close" onclick="closeModal('tripModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="tripForm" onsubmit="saveTrip(event)">
          <input type="hidden" id="tripId">
          <div class="form-group">
            <label>旅行名称 *</label>
            <input type="text" id="tripName" required>
          </div>
          <div class="form-group">
            <label>目的地</label>
            <input type="text" id="tripDestination">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>开始日期</label>
              <input type="date" id="tripStartDate">
            </div>
            <div class="form-group">
              <label>结束日期</label>
              <input type="date" id="tripEndDate">
            </div>
          </div>
          <div class="form-group">
            <label>备注</label>
            <textarea id="tripNotes" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </div>
    </div>
  </div>

  <div id="itemModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="itemModalTitle">添加物品</h3>
        <span class="close" onclick="closeModal('itemModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="itemForm" onsubmit="saveItem(event)">
          <input type="hidden" id="itemId">
          <div class="form-row">
            <div class="form-group">
              <label>分类</label>
              <select id="itemCategory"></select>
            </div>
            <div class="form-group">
              <label>数量</label>
              <input type="number" id="itemQuantity" value="1" min="1">
            </div>
          </div>
          <div class="form-group">
            <label>物品名称 *</label>
            <input type="text" id="itemName" required>
          </div>
          <div class="form-group">
            <label>备注</label>
            <input type="text" id="itemNotes">
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </div>
    </div>
  </div>

  <div id="routeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="routeModalTitle">添加路线</h3>
        <span class="close" onclick="closeModal('routeModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="routeForm" onsubmit="saveRoute(event)">
          <input type="hidden" id="routeId">
          <div class="form-row">
            <div class="form-group">
              <label>天数</label>
              <input type="number" id="routeDay" value="1" min="1">
            </div>
            <div class="form-group">
              <label>地点</label>
              <input type="text" id="routeLocation">
            </div>
          </div>
          <div class="form-group">
            <label>行程描述</label>
            <textarea id="routeDescription" rows="2"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>交通方式</label>
              <input type="text" id="routeTransportation">
            </div>
            <div class="form-group">
              <label>住宿</label>
              <input type="text" id="routeAccommodation">
            </div>
          </div>
          <div class="form-group">
            <label>备注</label>
            <input type="text" id="routeNotes">
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </div>
    </div>
  </div>

  <div id="budgetModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="budgetModalTitle">添加预算</h3>
        <span class="close" onclick="closeModal('budgetModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="budgetForm" onsubmit="saveBudget(event)">
          <input type="hidden" id="budgetId">
          <div class="form-group">
            <label>类别 *</label>
            <select id="budgetCategory" required>
              <option value="交通">🚗 交通</option>
              <option value="住宿">🏨 住宿</option>
              <option value="餐饮">🍽️ 餐饮</option>
              <option value="门票">🎫 门票</option>
              <option value="购物">🛍️ 购物</option>
              <option value="娱乐">🎮 娱乐</option>
              <option value="其他">📦 其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>描述</label>
            <input type="text" id="budgetDescription">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>预算金额</label>
              <input type="number" id="budgetEstimated" value="0" min="0" step="0.01">
            </div>
            <div class="form-group">
              <label>实际花费</label>
              <input type="number" id="budgetActual" value="0" min="0" step="0.01">
            </div>
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
