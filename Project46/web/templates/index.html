<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农资农具门店管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>农资农具管理</h2>
            <p>门店管理系统</p>
        </div>
        <ul class="nav-menu">
            <li><a href="/"><i class="fas fa-home"></i><span>首页概览</span></a></li>
            <li><a href="/tools"><i class="fas fa-toolbox"></i><span>农具管理</span></a></li>
            <li><a href="/purchases"><i class="fas fa-shopping-cart"></i><span>采购记录</span></a></li>
            <li><a href="/repairs"><i class="fas fa-wrench"></i><span>维修登记</span></a></li>
            <li><a href="/inventory"><i class="fas fa-clipboard-list"></i><span>库存盘点</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>首页概览</h1>
                <p>系统数据总览</p>
            </div>
            <div>
                <button class="btn btn-primary" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i> 刷新数据
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>农具品类</h3>
                <div class="value" id="stat-category-count">0</div>
                <div class="subtitle">当前分类总数</div>
            </div>
            <div class="stat-card">
                <h3>农具总数</h3>
                <div class="value" id="stat-tool-count">0</div>
                <div class="subtitle">在库农具品种</div>
            </div>
            <div class="stat-card warning">
                <h3>库存预警</h3>
                <div class="value" id="stat-low-stock">0</div>
                <div class="subtitle">低于最低库存</div>
            </div>
            <div class="stat-card info">
                <h3>农户数量</h3>
                <div class="value" id="stat-farmer-count">0</div>
                <div class="subtitle">注册农户总数</div>
            </div>
            <div class="stat-card">
                <h3>销售总额</h3>
                <div class="value" id="stat-total-sales">¥0.00</div>
                <div class="subtitle">累计销售金额</div>
            </div>
            <div class="stat-card">
                <h3>维修费用</h3>
                <div class="value" id="stat-repair-cost">¥0.00</div>
                <div class="subtitle">累计维修支出</div>
            </div>
            <div class="stat-card info">
                <h3>今日采购</h3>
                <div class="value" id="stat-today-purchases">0</div>
                <div class="subtitle">今日新增记录</div>
            </div>
            <div class="stat-card danger">
                <h3>待维修</h3>
                <div class="value" id="stat-pending-repairs">0</div>
                <div class="subtitle">待处理维修单</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-layer-group"></i> 农具品类</h3>
            </div>
            <div class="card-body" id="categories-list">
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
