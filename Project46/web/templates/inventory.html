<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存盘点 - 农资农具门店管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>农资农具管理</h2>
            <p>门店管理系统</p>
        </div>
        <ul class="nav-menu">
            <li><a href="/"><i class="fas fa-home"></i><span>首页概览</span></a></li>
            <li><a href="/tools"><i class="fas fa-toolbox"></i><span>农具管理</span></a></li>
            <li><a href="/purchases"><i class="fas fa-shopping-cart"></i><span>采购记录</span></a></li>
            <li><a href="/repairs"><i class="fas fa-wrench"></i><span>维修登记</span></a></li>
            <li><a href="/inventory"><i class="fas fa-clipboard-list"></i><span>库存盘点</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>库存盘点</h1>
                <p>库存盘点记录管理</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('inventory-modal')">
                <i class="fas fa-plus"></i> 新增盘点
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-list"></i> 盘点记录</h3>
            </div>
            <div class="card-body" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>盘点日期</th>
                            <th>农具</th>
                            <th>盘点前库存</th>
                            <th>盘点后库存</th>
                            <th>差额</th>
                            <th>差异原因</th>
                            <th>盘点人</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal" id="inventory-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新增库存盘点</h3>
                <button class="close-btn">&times;</button>
            </div>
            <form id="inventory-form">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>农具</label>
                            <select id="inventory-tool" data-tool-select required>
                                <option value="">请选择农具</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>盘点人</label>
                            <input type="text" id="inventory-operator" required placeholder="请输入盘点人姓名">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>盘点前库存</label>
                            <input type="number" id="inventory-prev-stock" readonly>
                        </div>
                        <div class="form-group">
                            <label>盘点后库存</label>
                            <input type="number" id="inventory-new-stock" min="0" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>差异原因</label>
                        <textarea id="inventory-reason" rows="3" placeholder="请说明差异原因（如损耗、丢失等）"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('inventory-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
