<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购记录 - 农资农具门店管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>农资农具管理</h2>
            <p>门店管理系统</p>
        </div>
        <ul class="nav-menu">
            <li><a href="/"><i class="fas fa-home"></i><span>首页概览</span></a></li>
            <li><a href="/tools"><i class="fas fa-toolbox"></i><span>农具管理</span></a></li>
            <li><a href="/purchases"><i class="fas fa-shopping-cart"></i><span>采购记录</span></a></li>
            <li><a href="/repairs"><i class="fas fa-wrench"></i><span>维修登记</span></a></li>
            <li><a href="/inventory"><i class="fas fa-clipboard-list"></i><span>库存盘点</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>采购记录</h1>
                <p>农户采购记录管理</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('purchase-modal')">
                <i class="fas fa-plus"></i> 新增采购
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-list"></i> 采购列表</h3>
            </div>
            <div class="card-body" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>采购日期</th>
                            <th>农户</th>
                            <th>农具</th>
                            <th>数量</th>
                            <th>单价</th>
                            <th>总价</th>
                            <th>支付方式</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="purchases-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal" id="purchase-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新增采购记录</h3>
                <button class="close-btn">&times;</button>
            </div>
            <form id="purchase-form">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>农户</label>
                            <select id="purchase-farmer" data-farmer-select required>
                                <option value="">请选择农户</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>农具</label>
                            <select id="purchase-tool" data-tool-select required>
                                <option value="">请选择农具</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>数量</label>
                            <input type="number" id="purchase-quantity" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>单价 (元)</label>
                            <input type="number" id="purchase-unit-price" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>总价 (元)</label>
                            <input type="number" id="purchase-total-price" step="0.01" readonly>
                        </div>
                        <div class="form-group">
                            <label>支付方式</label>
                            <select id="purchase-payment" required>
                                <option value="现金">现金</option>
                                <option value="微信">微信</option>
                                <option value="支付宝">支付宝</option>
                                <option value="银行转账">银行转账</option>
                                <option value="赊账">赊账</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="purchase-remark" rows="3" placeholder="请输入备注信息"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('purchase-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
