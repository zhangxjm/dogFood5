<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维修登记 - 农资农具门店管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>农资农具管理</h2>
            <p>门店管理系统</p>
        </div>
        <ul class="nav-menu">
            <li><a href="/"><i class="fas fa-home"></i><span>首页概览</span></a></li>
            <li><a href="/tools"><i class="fas fa-toolbox"></i><span>农具管理</span></a></li>
            <li><a href="/purchases"><i class="fas fa-shopping-cart"></i><span>采购记录</span></a></li>
            <li><a href="/repairs"><i class="fas fa-wrench"></i><span>维修登记</span></a></li>
            <li><a href="/inventory"><i class="fas fa-clipboard-list"></i><span>库存盘点</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>维修登记</h1>
                <p>农具维修记录管理</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('repair-modal')">
                <i class="fas fa-plus"></i> 新增维修
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-list"></i> 维修列表</h3>
                <select id="filter-status" style="padding: 8px 15px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">全部状态</option>
                    <option value="待维修">待维修</option>
                    <option value="维修中">维修中</option>
                    <option value="已完成">已完成</option>
                </select>
            </div>
            <div class="card-body" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>送修日期</th>
                            <th>农具</th>
                            <th>送修农户</th>
                            <th>故障描述</th>
                            <th>维修人员</th>
                            <th>维修费用</th>
                            <th>状态</th>
                            <th>完成日期</th>
                        </tr>
                    </thead>
                    <tbody id="repairs-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal" id="repair-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新增维修记录</h3>
                <button class="close-btn">&times;</button>
            </div>
            <form id="repair-form">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>农具</label>
                            <select id="repair-tool" data-tool-select required>
                                <option value="">请选择农具</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>送修农户</label>
                            <select id="repair-farmer" data-farmer-select required>
                                <option value="">请选择农户</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>故障描述</label>
                        <textarea id="repair-description" rows="3" required placeholder="请描述故障情况"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>维修人员</label>
                            <input type="text" id="repair-man" placeholder="请输入维修人员姓名">
                        </div>
                        <div class="form-group">
                            <label>维修费用 (元)</label>
                            <input type="number" id="repair-cost" step="0.01" min="0" value="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="repair-status">
                            <option value="待维修">待维修</option>
                            <option value="维修中">维修中</option>
                            <option value="已完成">已完成</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('repair-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
