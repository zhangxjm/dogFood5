<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农具管理 - 农资农具门店管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>农资农具管理</h2>
            <p>门店管理系统</p>
        </div>
        <ul class="nav-menu">
            <li><a href="/"><i class="fas fa-home"></i><span>首页概览</span></a></li>
            <li><a href="/tools"><i class="fas fa-toolbox"></i><span>农具管理</span></a></li>
            <li><a href="/purchases"><i class="fas fa-shopping-cart"></i><span>采购记录</span></a></li>
            <li><a href="/repairs"><i class="fas fa-wrench"></i><span>维修登记</span></a></li>
            <li><a href="/inventory"><i class="fas fa-clipboard-list"></i><span>库存盘点</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>农具管理</h1>
                <p>管理所有农具信息</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-list"></i> 农具列表</h3>
                <div class="search-bar" style="margin: 0;">
                    <select id="filter-category" data-category-select>
                        <option value="">全部品类</option>
                    </select>
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>编码</th>
                            <th>名称</th>
                            <th>品类</th>
                            <th>品牌</th>
                            <th>型号</th>
                            <th>库存</th>
                            <th>单价</th>
                            <th>位置</th>
                        </tr>
                    </thead>
                    <tbody id="tools-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
