{% extends 'base.html' %}

{% block title %}确认删除 - 诗词赏析分享平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">确认删除</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">确定要删除这条评论吗？</p>
                <p class="text-muted">评论内容：{{ comment.content|truncatechars:100 }}</p>
                <form method="POST" class="d-flex justify-content-center gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">确认删除</button>
                    {% if comment.poem %}
                    <a href="{% url 'poem_detail' comment.poem.pk %}" class="btn btn-secondary">取消</a>
                    {% else %}
                    <a href="{% url 'appreciation_detail' comment.appreciation.pk %}" class="btn btn-secondary">取消</a>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
