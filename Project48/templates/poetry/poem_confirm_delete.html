{% extends 'base.html' %}

{% block title %}确认删除 - 诗词赏析分享平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">确认删除</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">确定要删除诗词《{{ poem.title }}》吗？</p>
                <p class="text-muted">此操作不可撤销，相关赏析和评论也将被删除。</p>
                <form method="POST" class="d-flex justify-content-center gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">确认删除</button>
                    <a href="{% url 'poem_detail' poem.pk %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
