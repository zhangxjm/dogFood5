<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.Title}}</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
		.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
		.header h1 { font-size: 28px; margin-bottom: 10px; }
		.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1200px; margin: -30px auto 20px; padding: 0 20px; position: relative; z-index: 10; }
		.stat-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
		.stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
		.stat-card .num { font-size: 32px; font-weight: bold; }
		.stat-card.total .num { color: #667eea; }
		.stat-card.pending .num { color: #faad14; }
		.stat-card.assigned .num { color: #1890ff; }
		.stat-card.completed .num { color: #52c41a; }
		.stat-card.couriers .num { color: #722ed1; }
		.tabs { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
		.tab-nav { display: flex; background: white; border-radius: 10px 10px 0 0; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
		.tab-item { flex: 1; padding: 15px 20px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s; font-size: 16px; }
		.tab-item:hover { background: #f5f5f5; }
		.tab-item.active { background: #fafafa; border-bottom-color: #667eea; color: #667eea; font-weight: bold; }
		.tab-content { background: white; border-radius: 0 0 10px 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); min-height: 400px; }
		.tab-pane { display: none; }
		.tab-pane.active { display: block; }
		.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
		.btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
		.btn-primary { background: #667eea; color: white; }
		.btn-primary:hover { background: #5568d3; }
		.btn-success { background: #52c41a; color: white; }
		.btn-success:hover { background: #45a817; }
		.btn-warning { background: #faad14; color: white; }
		.btn-warning:hover { background: #d48806; }
		.btn-danger { background: #ff4d4f; color: white; }
		.btn-danger:hover { background: #d9363e; }
		.btn-sm { padding: 4px 10px; font-size: 12px; }
		.input, .select { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 5px; font-size: 14px; min-width: 150px; }
		.input:focus, .select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
		.table { width: 100%; border-collapse: collapse; }
		.table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #e8e8e8; }
		.table th { background: #fafafa; font-weight: 600; color: #333; }
		.table tr:hover { background: #f9f9f9; }
		.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
		.badge-pending { background: #fff7e6; color: #fa8c16; }
		.badge-assigned { background: #e6f7ff; color: #1890ff; }
		.badge-completed { background: #f6ffed; color: #52c41a; }
		.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
		.modal-overlay.active { display: flex; }
		.modal { background: white; border-radius: 10px; padding: 25px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
		.modal h3 { margin-bottom: 20px; color: #333; }
		.form-group { margin-bottom: 15px; }
		.form-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
		.form-group .input, .form-group .select { width: 100%; }
		.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
		.btn-default { background: #fff; border: 1px solid #d9d9d9; color: #333; }
		.btn-default:hover { border-color: #667eea; color: #667eea; }
		.empty { text-align: center; padding: 60px 20px; color: #999; }
		.empty-icon { font-size: 60px; margin-bottom: 15px; }
		.actions { display: flex; gap: 5px; }
	</style>
</head>
<body>
	<div class="header">
		<h1>📦 校园快递代取登记系统</h1>
		<p>Campus Express Pickup Registration System</p>
	</div>

	<div class="stats">
		<div class="stat-card total"><h3>快递总数</h3><div class="num" id="statTotal">0</div></div>
		<div class="stat-card pending"><h3>待分配</h3><div class="num" id="statPending">0</div></div>
		<div class="stat-card assigned"><h3>待取件</h3><div class="num" id="statAssigned">0</div></div>
		<div class="stat-card completed"><h3>已完成</h3><div class="num" id="statCompleted">0</div></div>
		<div class="stat-card couriers"><h3>代取人员</h3><div class="num" id="statCouriers">0</div></div>
	</div>

	<div class="tabs">
		<div class="tab-nav">
			<div class="tab-item active" onclick="switchTab('express')">📋 快递管理</div>
			<div class="tab-item" onclick="switchTab('courier')">👥 代取人员</div>
			<div class="tab-item" onclick="switchTab('record')">📊 代取记录</div>
		</div>
		<div class="tab-content">
			<div class="tab-pane active" id="tabExpress">
				<div class="toolbar">
					<button class="btn btn-primary" onclick="openExpressModal()">+ 新增快递</button>
					<input type="text" class="input" id="searchExpress" placeholder="搜索快递单号/收件人..." oninput="loadExpress()">
					<select class="select" id="filterStatus" onchange="loadExpress()">
						<option value="">全部状态</option>
						<option value="0">待分配</option>
						<option value="1">待取件</option>
						<option value="2">已完成</option>
					</select>
				</div>
				<table class="table">
					<thead>
						<tr><th>快递单号</th><th>收件人</th><th>电话</th><th>取件点</th><th>代取人</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
					</thead>
					<tbody id="expressList"></tbody>
				</table>
			</div>

			<div class="tab-pane" id="tabCourier">
				<div class="toolbar">
					<button class="btn btn-primary" onclick="openCourierModal()">+ 新增代取人员</button>
				</div>
				<table class="table">
					<thead>
						<tr><th>姓名</th><th>电话</th><th>学号</th><th>学院</th><th>注册时间</th><th>操作</th></tr>
					</thead>
					<tbody id="courierList"></tbody>
				</table>
			</div>

			<div class="tab-pane" id="tabRecord">
				<div class="toolbar">
					<input type="text" class="input" id="searchRecord" placeholder="搜索快递单号/代取人..." oninput="loadRecords()">
				</div>
				<table class="table">
					<thead>
						<tr><th>快递单号</th><th>代取人</th><th>取件时间</th><th>备注</th></tr>
					</thead>
					<tbody id="recordList"></tbody>
				</table>
			</div>
		</div>
	</div>

	<div class="modal-overlay" id="expressModal">
		<div class="modal">
			<h3 id="expressModalTitle">新增快递</h3>
			<div class="form-group"><label>快递单号 *</label><input type="text" class="input" id="expressNo"></div>
			<div class="form-group"><label>寄件人</label><input type="text" class="input" id="senderName"></div>
			<div class="form-group"><label>寄件人电话</label><input type="text" class="input" id="senderPhone"></div>
			<div class="form-group"><label>收件人 *</label><input type="text" class="input" id="receiverName"></div>
			<div class="form-group"><label>收件人电话 *</label><input type="text" class="input" id="receiverPhone"></div>
			<div class="form-group"><label>取件点</label><input type="text" class="input" id="pickupPoint"></div>
			<div class="form-group"><label>物品类型</label><input type="text" class="input" id="goodsType"></div>
			<div class="form-group"><label>重量(kg)</label><input type="number" step="0.01" class="input" id="weight"></div>
			<div class="form-group"><label>备注</label><input type="text" class="input" id="remark"></div>
			<div class="modal-footer">
				<button class="btn btn-default" onclick="closeModal('expressModal')">取消</button>
				<button class="btn btn-primary" onclick="saveExpress()">保存</button>
			</div>
		</div>
	</div>

	<div class="modal-overlay" id="courierModal">
		<div class="modal">
			<h3 id="courierModalTitle">新增代取人员</h3>
			<div class="form-group"><label>姓名 *</label><input type="text" class="input" id="courierName"></div>
			<div class="form-group"><label>电话 *</label><input type="text" class="input" id="courierPhone"></div>
			<div class="form-group"><label>学号 *</label><input type="text" class="input" id="studentId"></div>
			<div class="form-group"><label>学院</label><input type="text" class="input" id="college"></div>
			<div class="modal-footer">
				<button class="btn btn-default" onclick="closeModal('courierModal')">取消</button>
				<button class="btn btn-primary" onclick="saveCourier()">保存</button>
			</div>
		</div>
	</div>

	<div class="modal-overlay" id="assignModal">
		<div class="modal">
			<h3>分配代取人员</h3>
			<div class="form-group"><label>选择代取人 *</label><select class="select" id="assignCourier"></select></div>
			<div class="modal-footer">
				<button class="btn btn-default" onclick="closeModal('assignModal')">取消</button>
				<button class="btn btn-primary" onclick="confirmAssign()">确认分配</button>
			</div>
		</div>
	</div>

	<script>
		let currentExpressId = null;
		let currentCourierId = null;
		let currentAssignId = null;

		function switchTab(tab) {
			document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
			document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
			event.target.classList.add('active');
			document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
			if (tab === 'express') loadExpress();
			else if (tab === 'courier') loadCouriers();
			else if (tab === 'record') loadRecords();
		}

		function loadStats() {
			fetch('/stats').then(r => r.json()).then(res => {
				if (res.code === 200) {
					document.getElementById('statTotal').textContent = res.data.total;
					document.getElementById('statPending').textContent = res.data.pending;
					document.getElementById('statAssigned').textContent = res.data.assigned;
					document.getElementById('statCompleted').textContent = res.data.completed;
					document.getElementById('statCouriers').textContent = res.data.couriers;
				}
			});
		}

		function loadExpress() {
			const keyword = document.getElementById('searchExpress').value;
			const status = document.getElementById('filterStatus').value;
			let url = '/express';
			const params = new URLSearchParams();
			if (keyword) params.append('keyword', keyword);
			if (status !== '') params.append('status', status);
			if (params.toString()) url += '?' + params.toString();
			fetch(url).then(r => r.json()).then(res => {
				const tbody = document.getElementById('expressList');
				if (res.code === 200 && res.data && res.data.length > 0) {
					tbody.innerHTML = res.data.map(e => {
						const statusText = ['待分配', '待取件', '已完成'][e.status] || '未知';
						const statusClass = ['badge-pending', 'badge-assigned', 'badge-completed'][e.status] || '';
						return `<tr>
							<td>${e.express_no}</td>
							<td>${e.receiver_name}</td>
							<td>${e.receiver_phone}</td>
							<td>${e.pickup_point || '-'}</td>
							<td>${e.courier_name || '-'}</td>
							<td><span class="badge ${statusClass}">${statusText}</span></td>
							<td>${e.create_time ? e.create_time.substring(0, 19).replace('T', ' ') : '-'}</td>
							<td class="actions">
								${e.status === 0 ? `<button class="btn btn-warning btn-sm" onclick="openAssignModal(${e.id})">分配</button>` : ''}
								${e.status === 1 ? `<button class="btn btn-success btn-sm" onclick="completeExpress(${e.id})">完成</button>` : ''}
								<button class="btn btn-danger btn-sm" onclick="deleteExpress(${e.id})">删除</button>
							</td>
						</tr>`;
					}).join('');
				} else {
					tbody.innerHTML = '<tr><td colspan="8" class="empty"><div class="empty-icon">📭</div>暂无快递数据</td></tr>';
				}
			});
		}

		function loadCouriers() {
			fetch('/couriers').then(r => r.json()).then(res => {
				const tbody = document.getElementById('courierList');
				if (res.code === 200 && res.data && res.data.length > 0) {
					tbody.innerHTML = res.data.map(c => {
						return `<tr>
							<td>${c.name}</td>
							<td>${c.phone}</td>
							<td>${c.student_id}</td>
							<td>${c.college || '-'}</td>
							<td>${c.create_time ? c.create_time.substring(0, 19).replace('T', ' ') : '-'}</td>
							<td class="actions">
								<button class="btn btn-danger btn-sm" onclick="deleteCourier(${c.id})">删除</button>
							</td>
						</tr>`;
					}).join('');
				} else {
					tbody.innerHTML = '<tr><td colspan="6" class="empty"><div class="empty-icon">👥</div>暂无代取人员</td></tr>';
				}
			});
		}

		function loadRecords() {
			const keyword = document.getElementById('searchRecord').value;
			let url = '/records';
			if (keyword) url += '?keyword=' + encodeURIComponent(keyword);
			fetch(url).then(r => r.json()).then(res => {
				const tbody = document.getElementById('recordList');
				if (res.code === 200 && res.data && res.data.length > 0) {
					tbody.innerHTML = res.data.map(r => {
						return `<tr>
							<td>${r.express_no}</td>
							<td>${r.courier_name || '-'}</td>
							<td>${r.pickup_time ? r.pickup_time.substring(0, 19).replace('T', ' ') : '-'}</td>
							<td>${r.remark || '-'}</td>
						</tr>`;
					}).join('');
				} else {
					tbody.innerHTML = '<tr><td colspan="4" class="empty"><div class="empty-icon">📊</div>暂无代取记录</td></tr>';
				}
			});
		}

		function openExpressModal() {
			currentExpressId = null;
			document.getElementById('expressModalTitle').textContent = '新增快递';
			['expressNo', 'senderName', 'senderPhone', 'receiverName', 'receiverPhone', 'pickupPoint', 'goodsType', 'weight', 'remark'].forEach(id => {
				document.getElementById(id).value = '';
			});
			document.getElementById('expressModal').classList.add('active');
		}

		function saveExpress() {
			const data = {
				express_no: document.getElementById('expressNo').value,
				sender_name: document.getElementById('senderName').value,
				sender_phone: document.getElementById('senderPhone').value,
				receiver_name: document.getElementById('receiverName').value,
				receiver_phone: document.getElementById('receiverPhone').value,
				pickup_point: document.getElementById('pickupPoint').value,
				goods_type: document.getElementById('goodsType').value,
				weight: parseFloat(document.getElementById('weight').value) || 0,
				remark: document.getElementById('remark').value
			};
			fetch('/express', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(data)
			}).then(r => r.json()).then(res => {
				if (res.code === 200) {
					closeModal('expressModal');
					loadExpress();
					loadStats();
				} else {
					alert(res.msg);
				}
			});
		}

		function deleteExpress(id) {
			if (!confirm('确定要删除这条快递记录吗？')) return;
			fetch('/express/' + id, { method: 'DELETE' }).then(r => r.json()).then(res => {
				if (res.code === 200) {
					loadExpress();
					loadStats();
				} else {
					alert(res.msg);
				}
			});
		}

		function openAssignModal(id) {
			currentAssignId = id;
			fetch('/couriers').then(r => r.json()).then(res => {
				const select = document.getElementById('assignCourier');
				if (res.code === 200 && res.data && res.data.length > 0) {
					select.innerHTML = res.data.map(c => `<option value="${c.id}">${c.name} - ${c.student_id}</option>`).join('');
				} else {
					alert('请先添加代取人员');
					return;
				}
				document.getElementById('assignModal').classList.add('active');
			});
		}

		function confirmAssign() {
			const select = document.getElementById('assignCourier');
			const courierId = select.value;
			const courierName = select.options[select.selectedIndex].text.split(' - ')[0];
			fetch('/express/' + currentAssignId + '/assign', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ courier_id: parseInt(courierId), courier_name: courierName })
			}).then(r => r.json()).then(res => {
				if (res.code === 200) {
					closeModal('assignModal');
					loadExpress();
					loadStats();
				} else {
					alert(res.msg);
				}
			});
		}

		function completeExpress(id) {
			if (!confirm('确认完成取件？')) return;
			fetch('/express/' + id + '/complete', { method: 'POST' }).then(r => r.json()).then(res => {
				if (res.code === 200) {
					loadExpress();
					loadStats();
					loadRecords();
				} else {
					alert(res.msg);
				}
			});
		}

		function openCourierModal() {
			currentCourierId = null;
			document.getElementById('courierModalTitle').textContent = '新增代取人员';
			['courierName', 'courierPhone', 'studentId', 'college'].forEach(id => {
				document.getElementById(id).value = '';
			});
			document.getElementById('courierModal').classList.add('active');
		}

		function saveCourier() {
			const data = {
				name: document.getElementById('courierName').value,
				phone: document.getElementById('courierPhone').value,
				student_id: document.getElementById('studentId').value,
				college: document.getElementById('college').value
			};
			fetch('/couriers', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(data)
			}).then(r => r.json()).then(res => {
				if (res.code === 200) {
					closeModal('courierModal');
					loadCouriers();
					loadStats();
				} else {
					alert(res.msg);
				}
			});
		}

		function deleteCourier(id) {
			if (!confirm('确定要删除这位代取人员吗？')) return;
			fetch('/couriers/' + id, { method: 'DELETE' }).then(r => r.json()).then(res => {
				if (res.code === 200) {
					loadCouriers();
					loadStats();
				} else {
					alert(res.msg);
				}
			});
		}

		function closeModal(id) {
			document.getElementById(id).classList.remove('active');
		}

		loadStats();
		loadExpress();
	</script>
</body>
</html>
