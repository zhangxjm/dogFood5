<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职业技能学习笔记系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <span>学习笔记</span>
            </div>

            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索笔记关键词...">
            </div>

            <div class="category-header">
                <span>分类</span>
                <button class="btn-icon" id="addCategoryBtn" title="添加分类">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>

            <div class="category-list" id="categoryList">
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1 id="currentCategoryName">全部笔记</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addNoteBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        新建笔记
                    </button>
                </div>
            </header>

            <div class="notes-container" id="notesContainer">
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
                <p>暂无笔记</p>
            </div>
        </main>
    </div>

    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="noteModalTitle">新建笔记</h2>
                <button class="btn-icon close-btn" onclick="closeModal('noteModal')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="noteForm">
                <input type="hidden" id="noteId">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="noteTitle" placeholder="输入笔记标题" required>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="noteCategory" required>
                    </select>
                </div>
                <div class="form-group">
                    <label>标签（多个标签用逗号分隔）</label>
                    <input type="text" id="noteTags" placeholder="如：Python, 编程, 基础">
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="noteContent" placeholder="输入笔记内容..." rows="10" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('noteModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="categoryModalTitle">新建分类</h2>
                <button class="btn-icon close-btn" onclick="closeModal('categoryModal')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label>分类名称</label>
                    <input type="text" id="categoryName" placeholder="输入分类名称" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="categoryDescription" placeholder="输入分类描述" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>颜色</label>
                    <div class="color-picker">
                        <input type="color" id="categoryColor" value="#3B82F6">
                        <input type="text" id="categoryColorText" value="#3B82F6">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('categoryModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/static/app.js"></script>
</body>
</html>
