version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jushas-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: jushas123
      MYSQL_DATABASE: jushas_manager
      TZ: Asia/Shanghai
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    networks:
      - jushas-network

volumes:
  mysql-data:

networks:
  jushas-network:
    driver: bridge
