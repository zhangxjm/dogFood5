<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理 - 线上乐器教学预约系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 线上乐器教学预约系统</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/courses">课程管理</a>
                <a href="/bookings" class="active">预约管理</a>
                <a href="/records">授课记录</a>
                <a href="/stats">数据统计</a>
            </nav>
        </header>
        
        <main>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h2 class="page-title" style="margin-bottom: 0; border-bottom: none;">预约管理</h2>
                <button class="btn btn-primary" onclick="openAddBookingModal()">➕ 新增预约</button>
            </div>
            
            <div class="filter-bar">
                <label style="color: #666; font-weight: 500;">状态:</label>
                <select id="statusFilter" onchange="loadBookings()">
                    <option value="">全部</option>
                    <option value="confirmed">已确认</option>
                    <option value="completed">已完成</option>
                    <option value="cancelled">已取消</option>
                </select>
            </div>
            
            <div id="bookingList">
                <div class="loading">加载中...</div>
            </div>
        </main>
    </div>
    
    <div id="addBookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>新增预约</h2>
                <button class="close-btn" onclick="closeModal('addBookingModal')">&times;</button>
            </div>
            <form id="bookingForm" onsubmit="saveBooking(event)">
                <div class="form-group">
                    <label>选择课程 *</label>
                    <select id="bookingCourse" required onchange="updateTimeFields()">
                        <option value="">请选择课程</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>学员姓名 *</label>
                    <input type="text" id="studentName" required placeholder="请输入学员姓名">
                </div>
                <div class="form-group">
                    <label>联系电话 *</label>
                    <input type="tel" id="studentPhone" required placeholder="请输入联系电话">
                </div>
                <div class="form-group">
                    <label>电子邮箱</label>
                    <input type="email" id="studentEmail" placeholder="选填">
                </div>
                <div class="form-group">
                    <label>预约日期 *</label>
                    <input type="date" id="bookingDate" required>
                </div>
                <div class="form-group">
                    <label>开始时间 *</label>
                    <input type="time" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>结束时间 *</label>
                    <input type="time" id="endTime" required>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="bookingNotes" placeholder="选填"></textarea>
                </div>
                <div id="conflictWarning" style="color: #f5576c; margin-bottom: 15px; display: none;">
                    ⚠️ 该时间段已有预约或名额已满
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addBookingModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确认预约</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>
        let currentBookings = [];
        let currentCourses = [];
        let selectedCourseId = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        const preSelectedCourseId = urlParams.get('courseId');
        const preSelectedCourseName = urlParams.get('courseName');
        
        async function loadCourses() {
            try {
                currentCourses = await apiCall(`${API_BASE}/courses`);
                const select = document.getElementById('bookingCourse');
                select.innerHTML = '<option value="">请选择课程</option>';
                currentCourses.forEach(course => {
                    const option = document.createElement('option');
                    option.value = course.id;
                    option.textContent = `${course.name} - ${course.teacher_name} (${course.duration_minutes}分钟)`;
                    select.appendChild(option);
                });
                
                if (preSelectedCourseId) {
                    select.value = preSelectedCourseId;
                    updateTimeFields();
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        function updateTimeFields() {
            const courseId = document.getElementById('bookingCourse').value;
            const course = currentCourses.find(c => c.id == courseId);
            selectedCourseId = courseId ? parseInt(courseId) : null;
            
            if (course) {
                const dateInput = document.getElementById('bookingDate');
                const today = new Date().toISOString().split('T')[0];
                dateInput.min = today;
                
                if (!dateInput.value) {
                    dateInput.value = today;
                }
                
                checkConflict();
            }
        }
        
        async function checkConflict() {
            const courseId = document.getElementById('bookingCourse').value;
            const bookingDate = document.getElementById('bookingDate').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            
            if (!courseId || !bookingDate || !startTime || !endTime) {
                document.getElementById('conflictWarning').style.display = 'none';
                return;
            }
            
            try {
                const result = await apiCall(
                    `${API_BASE}/bookings/check/conflict?course_id=${courseId}&booking_date=${bookingDate}&start_time=${startTime}&end_time=${endTime}`
                );
                
                document.getElementById('conflictWarning').style.display = result.has_conflict ? 'block' : 'none';
            } catch (e) {
                console.error(e);
            }
        }
        
        document.getElementById('bookingDate').addEventListener('change', checkConflict);
        document.getElementById('startTime').addEventListener('change', checkConflict);
        document.getElementById('endTime').addEventListener('change', checkConflict);
        
        async function loadBookings() {
            const status = document.getElementById('statusFilter').value;
            const url = status 
                ? `${API_BASE}/bookings?status=${encodeURIComponent(status)}`
                : `${API_BASE}/bookings`;
            
            try {
                const bookings = await apiCall(url);
                currentBookings = bookings;
                renderBookings(bookings);
            } catch (e) {
                document.getElementById('bookingList').innerHTML = `
                    <div class="empty-state">
                        <p>加载预约失败</p>
                    </div>
                `;
            }
        }
        
        function renderBookings(bookings) {
            const container = document.getElementById('bookingList');
            
            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>暂无预约记录</p>
                        <button class="btn btn-primary" onclick="openAddBookingModal()">立即预约</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>课程名称</th>
                            <th>学员姓名</th>
                            <th>联系电话</th>
                            <th>预约日期</th>
                            <th>时间段</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(booking => `
                            <tr>
                                <td>${booking.course.name}</td>
                                <td>${booking.student.name}</td>
                                <td>${booking.student.phone}</td>
                                <td>${formatDate(booking.booking_date)}</td>
                                <td>${booking.start_time} - ${booking.end_time}</td>
                                <td>${getStatusBadge(booking.status)}</td>
                                <td>
                                    ${booking.status === 'confirmed' ? `
                                        <button class="btn btn-success btn-sm" onclick="createRecord(${booking.id})" style="padding: 5px 10px; font-size: 12px;">开始授课</button>
                                        <button class="btn btn-danger btn-sm" onclick="cancelBooking(${booking.id})" style="padding: 5px 10px; font-size: 12px;">取消</button>
                                    ` : booking.status === 'completed' ? `
                                        <button class="btn btn-warning btn-sm" onclick="viewRecord(${booking.id})" style="padding: 5px 10px; font-size: 12px;">查看记录</button>
                                    ` : ''}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function openAddBookingModal() {
            document.getElementById('bookingForm').reset();
            if (preSelectedCourseId) {
                document.getElementById('bookingCourse').value = preSelectedCourseId;
                updateTimeFields();
            }
            document.getElementById('conflictWarning').style.display = 'none';
            openModal('addBookingModal');
        }
        
        async function saveBooking(event) {
            event.preventDefault();
            
            const courseId = parseInt(document.getElementById('bookingCourse').value);
            const course = currentCourses.find(c => c.id === courseId);
            
            const bookingData = {
                course_id: courseId,
                student_id: 0,
                booking_date: document.getElementById('bookingDate').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                notes: document.getElementById('bookingNotes').value
            };
            
            const studentName = document.getElementById('studentName').value;
            const studentPhone = document.getElementById('studentPhone').value;
            const studentEmail = document.getElementById('studentEmail').value;
            
            try {
                const queryString = `student_name=${encodeURIComponent(studentName)}&student_phone=${encodeURIComponent(studentPhone)}${studentEmail ? `&student_email=${encodeURIComponent(studentEmail)}` : ''}`;
                
                await apiCall(`${API_BASE}/bookings?${queryString}`, {
                    method: 'POST',
                    body: JSON.stringify(bookingData)
                });
                
                showAlert('预约成功！');
                closeModal('addBookingModal');
                loadBookings();
            } catch (e) {
                console.error(e);
            }
        }
        
        async function cancelBooking(bookingId) {
            if (!confirm('确定要取消此预约吗？')) return;
            
            try {
                await apiCall(`${API_BASE}/bookings/${bookingId}`, {
                    method: 'DELETE'
                });
                showAlert('预约已取消！');
                loadBookings();
            } catch (e) {
                console.error(e);
            }
        }
        
        async function createRecord(bookingId) {
            try {
                const result = await apiCall(`${API_BASE}/records/`, {
                    method: 'POST',
                    body: JSON.stringify({
                        booking_id: bookingId,
                        content_summary: '',
                        homework: '',
                        teacher_notes: '',
                        student_feedback: ''
                    })
                });
                
                showAlert('授课已开始，请前往记录页面填写详情！');
                setTimeout(() => {
                    window.location.href = `/records?bookingId=${bookingId}`;
                }, 1500);
            } catch (e) {
                console.error(e);
            }
        }
        
        function viewRecord(bookingId) {
            window.location.href = `/records?bookingId=${bookingId}`;
        }
        
        if (preSelectedCourseId) {
            setTimeout(() => openAddBookingModal(), 500);
        }
        
        loadCourses();
        loadBookings();
    </script>
</body>
</html>
