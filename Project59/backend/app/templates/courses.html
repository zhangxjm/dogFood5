<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理 - 线上乐器教学预约系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 线上乐器教学预约系统</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/courses" class="active">课程管理</a>
                <a href="/bookings">预约管理</a>
                <a href="/records">授课记录</a>
                <a href="/stats">数据统计</a>
            </nav>
        </header>
        
        <main>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h2 class="page-title" style="margin-bottom: 0; border-bottom: none;">课程管理</h2>
                <button class="btn btn-primary" onclick="openAddCourseModal()">➕ 新增课程</button>
            </div>
            
            <div class="filter-bar">
                <label style="color: #666; font-weight: 500;">乐器类型:</label>
                <select id="instrumentFilter" onchange="loadCourses()">
                    <option value="">全部</option>
                </select>
            </div>
            
            <div id="courseList" class="course-grid">
                <div class="loading">加载中...</div>
            </div>
        </main>
    </div>
    
    <div id="addCourseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增课程</h2>
                <button class="close-btn" onclick="closeModal('addCourseModal')">&times;</button>
            </div>
            <form id="courseForm" onsubmit="saveCourse(event)">
                <input type="hidden" id="courseId">
                <div class="form-group">
                    <label>课程名称 *</label>
                    <input type="text" id="courseName" required placeholder="例如：钢琴入门课程">
                </div>
                <div class="form-group">
                    <label>乐器类型 *</label>
                    <select id="courseInstrument" required>
                        <option value="">请选择</option>
                        <option value="钢琴">钢琴</option>
                        <option value="吉他">吉他</option>
                        <option value="小提琴">小提琴</option>
                        <option value="古筝">古筝</option>
                        <option value="架子鼓">架子鼓</option>
                        <option value="声乐">声乐</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>授课教师 *</label>
                    <input type="text" id="courseTeacher" required placeholder="教师姓名">
                </div>
                <div class="form-group">
                    <label>课程描述</label>
                    <textarea id="courseDescription" placeholder="简要介绍课程内容"></textarea>
                </div>
                <div class="form-group">
                    <label>课程时长（分钟）*</label>
                    <input type="number" id="courseDuration" required min="15" step="15" value="60">
                </div>
                <div class="form-group">
                    <label>课程价格（元）*</label>
                    <input type="number" id="coursePrice" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>最大学员数 *</label>
                    <input type="number" id="courseMaxStudents" required min="1" value="1">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addCourseModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>
        let currentCourses = [];
        
        async function loadInstruments() {
            try {
                const data = await apiCall(`${API_BASE}/courses/instruments`);
                const select = document.getElementById('instrumentFilter');
                data.instruments.forEach(inst => {
                    const option = document.createElement('option');
                    option.value = inst;
                    option.textContent = inst;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadCourses() {
            const instrument = document.getElementById('instrumentFilter').value;
            const url = instrument 
                ? `${API_BASE}/courses?instrument=${encodeURIComponent(instrument)}`
                : `${API_BASE}/courses`;
            
            try {
                const courses = await apiCall(url);
                currentCourses = courses;
                renderCourses(courses);
            } catch (e) {
                document.getElementById('courseList').innerHTML = `
                    <div class="empty-state">
                        <p>加载课程失败</p>
                    </div>
                `;
            }
        }
        
        function renderCourses(courses) {
            const container = document.getElementById('courseList');
            
            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>暂无课程</p>
                        <button class="btn btn-primary" onclick="openAddCourseModal()">立即添加</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = courses.map(course => `
                <div class="course-card">
                    <span class="instrument">${course.instrument}</span>
                    <h3>${course.name}</h3>
                    <div class="teacher">👨‍🏫 ${course.teacher_name}</div>
                    <div class="description">${course.description || '暂无描述'}</div>
                    <div class="price">${formatCurrency(course.price)}</div>
                    <div class="duration">⏱️ ${course.duration_minutes}分钟 | 👥 最多${course.max_students}人</div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="openBookingModal(${course.id})">预约</button>
                        <button class="btn btn-warning" onclick="editCourse(${course.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteCourse(${course.id})">下架</button>
                    </div>
                </div>
            `).join('');
        }
        
        function openAddCourseModal() {
            document.getElementById('modalTitle').textContent = '新增课程';
            document.getElementById('courseForm').reset();
            document.getElementById('courseId').value = '';
            openModal('addCourseModal');
        }
        
        function editCourse(courseId) {
            const course = currentCourses.find(c => c.id === courseId);
            if (!course) return;
            
            document.getElementById('modalTitle').textContent = '编辑课程';
            document.getElementById('courseId').value = course.id;
            document.getElementById('courseName').value = course.name;
            document.getElementById('courseInstrument').value = course.instrument;
            document.getElementById('courseTeacher').value = course.teacher_name;
            document.getElementById('courseDescription').value = course.description || '';
            document.getElementById('courseDuration').value = course.duration_minutes;
            document.getElementById('coursePrice').value = course.price;
            document.getElementById('courseMaxStudents').value = course.max_students;
            
            openModal('addCourseModal');
        }
        
        async function saveCourse(event) {
            event.preventDefault();
            
            const courseData = {
                name: document.getElementById('courseName').value,
                instrument: document.getElementById('courseInstrument').value,
                teacher_name: document.getElementById('courseTeacher').value,
                description: document.getElementById('courseDescription').value,
                duration_minutes: parseInt(document.getElementById('courseDuration').value),
                price: parseFloat(document.getElementById('coursePrice').value),
                max_students: parseInt(document.getElementById('courseMaxStudents').value),
                is_active: 1
            };
            
            const courseId = document.getElementById('courseId').value;
            
            try {
                if (courseId) {
                    await apiCall(`${API_BASE}/courses/${courseId}`, {
                        method: 'PUT',
                        body: JSON.stringify(courseData)
                    });
                    showAlert('课程更新成功！');
                } else {
                    await apiCall(`${API_BASE}/courses/`, {
                        method: 'POST',
                        body: JSON.stringify(courseData)
                    });
                    showAlert('课程添加成功！');
                }
                
                closeModal('addCourseModal');
                loadCourses();
                loadInstruments();
            } catch (e) {
                console.error(e);
            }
        }
        
        async function deleteCourse(courseId) {
            if (!confirm('确定要下架此课程吗？')) return;
            
            try {
                await apiCall(`${API_BASE}/courses/${courseId}`, {
                    method: 'DELETE'
                });
                showAlert('课程已下架！');
                loadCourses();
            } catch (e) {
                console.error(e);
            }
        }
        
        function openBookingModal(courseId) {
            const course = currentCourses.find(c => c.id === courseId);
            if (!course) return;
            
            const bookingUrl = `/bookings?courseId=${courseId}&courseName=${encodeURIComponent(course.name)}`;
            window.location.href = bookingUrl;
        }
        
        loadInstruments();
        loadCourses();
    </script>
</body>
</html>
