<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 线上乐器教学预约系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 线上乐器教学预约系统</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/courses">课程管理</a>
                <a href="/bookings">预约管理</a>
                <a href="/records">授课记录</a>
                <a href="/stats" class="active">数据统计</a>
            </nav>
        </header>
        
        <main>
            <h2 class="page-title">数据统计</h2>
            
            <div id="statsContent">
                <div class="loading">加载中...</div>
            </div>
            
            <div style="margin-top: 40px;">
                <h3 class="page-title" style="font-size: 20px;">近期授课记录</h3>
                <div id="recentRecords">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>
        async function loadStats() {
            try {
                const stats = await apiCall(`${API_BASE}/records/stats`);
                renderStats(stats);
            } catch (e) {
                document.getElementById('statsContent').innerHTML = `
                    <div class="empty-state">
                        <p>加载统计数据失败</p>
                    </div>
                `;
            }
        }
        
        function renderStats(stats) {
            const container = document.getElementById('statsContent');
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${stats.total_courses}</div>
                        <div class="stat-label">上架课程数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.total_bookings}</div>
                        <div class="stat-label">总预约数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.total_completed_lessons}</div>
                        <div class="stat-label">已完成课程</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${formatDuration(stats.total_duration_minutes)}</div>
                        <div class="stat-label">累计授课时长</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${formatCurrency(stats.total_revenue)}</div>
                        <div class="stat-label">累计营收</div>
                    </div>
                </div>
                
                <div style="margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px;">
                        <h3 style="color: #667eea; margin-bottom: 15px;">📊 数据说明</h3>
                        <ul style="color: #666; font-size: 14px; line-height: 2; padding-left: 20px;">
                            <li><strong>上架课程数：</strong>当前系统中所有上架的课程数量</li>
                            <li><strong>总预约数：</strong>系统中所有预约记录的总数</li>
                            <li><strong>已完成课程：</strong>状态为"已完成"的课程数量</li>
                            <li><strong>累计授课时长：</strong>所有已完成课程的实际授课时长总和</li>
                            <li><strong>累计营收：</strong>所有已完成课程的费用总和</li>
                        </ul>
                    </div>
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px;">
                        <h3 style="color: #667eea; margin-bottom: 15px;">💡 运营建议</h3>
                        <ul style="color: #666; font-size: 14px; line-height: 2; padding-left: 20px;">
                            <li>定期查看授课记录，了解学员学习进度</li>
                            <li>分析热门课程，合理安排师资力量</li>
                            <li>及时记录授课内容，建立完整教学档案</li>
                            <li>关注学员反馈，持续提升教学质量</li>
                            <li>统计课时完成率，优化课程安排</li>
                        </ul>
                    </div>
                </div>
            `;
        }
        
        async function loadRecentRecords() {
            try {
                const records = await apiCall(`${API_BASE}/records/?limit=10`);
                renderRecentRecords(records);
            } catch (e) {
                document.getElementById('recentRecords').innerHTML = `
                    <div class="empty-state">
                        <p>加载记录失败</p>
                    </div>
                `;
            }
        }
        
        function renderRecentRecords(records) {
            const container = document.getElementById('recentRecords');
            
            if (records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>暂无授课记录</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>课程名称</th>
                            <th>学员姓名</th>
                            <th>授课教师</th>
                            <th>授课日期</th>
                            <th>实际时长</th>
                            <th>课程内容</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${records.map(record => `
                            <tr>
                                <td>${record.course_name}</td>
                                <td>${record.student_name}</td>
                                <td>${record.teacher_name}</td>
                                <td>${formatDate(record.booking_date)}</td>
                                <td>${formatDuration(record.duration_minutes)}</td>
                                <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                    ${record.content_summary || '未填写'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        loadStats();
        loadRecentRecords();
    </script>
</body>
</html>
