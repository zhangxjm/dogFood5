version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/music_school.db
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    container_name: music_school_app
