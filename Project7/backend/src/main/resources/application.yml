server:
  port: 8080

spring:
  application:
    name: task-manager
  datasource:
    url: jdbc:sqlite:task_manager.db
    driver-class-name: org.sqlite.JDBC
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    properties:
      hibernate:
        jdbc:
          use_get_generated_keys: false
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: taskManagerSecretKeyForJWTTokenGeneration2024VeryLongSecretKey
  expiration: 86400000

cors:
  allowed-origins: http://localhost:5173,http://localhost:8080
