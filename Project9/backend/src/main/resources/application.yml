server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: fresh-food-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fresh_food_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&sessionVariables=character_set_client=utf8mb4,character_set_results=utf8mb4,character_set_connection=utf8mb4
    username: fresh_food
    password: fresh123456

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.freshfood.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: fresh-food-secret-key-2024
  expiration: 86400000
